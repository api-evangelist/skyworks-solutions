description: >-
  Skyworks Solutions, Inc. is an American semiconductor company headquartered in
  Irvine, California that designs, develops, and markets proprietary semiconductor
  products for wireless communications, automotive, broadband, connected home,
  industrial, defense, and consumer electronics applications. Skyworks is a leading
  provider of analog and mixed-signal semiconductors, with dominant market share in
  5G RF front-end modules (35% market share). Products span amplifiers, filters,
  front-end modules, isolators, switches, and power management ICs serving mobile,
  automotive, IoT, and infrastructure markets. The company does not publish a public
  developer API but provides datasheets, evaluation tools, and design resources for
  hardware engineers.
